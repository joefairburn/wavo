name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install
      - run: vp run lint
      - run: vp run format:check
      - run: vp run type-check
      - run: vp run build

      - name: Lint docs and test app
        run: |
          cd docs && vp run lint
          cd ../test && vp run lint

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      - run: vp run test:unit

      - name: Install Playwright browsers
        run: vp exec --filter test playwright install --with-deps

      - run: vp run test:e2e
      - run: vp run build:docs

  test-matrix:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - run: vp install

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - run: vp run test:unit

  size-baseline:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - run: vp exec size-limit --json | sed -n '/^\[/,/^\]/p' > size-baseline.json

      - uses: actions/cache/save@v4
        with:
          path: size-baseline.json
          key: size-baseline-main

  size:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - id: baseline
        uses: actions/cache/restore@v4
        with:
          path: size-baseline.json
          key: size-baseline-main

      - run: vp exec size-limit --json | sed -n '/^\[/,/^\]/p' > size-current.json

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const current = JSON.parse(fs.readFileSync('size-current.json', 'utf8'));

            let baseline = null;
            if (fs.existsSync('size-baseline.json')) {
              baseline = JSON.parse(fs.readFileSync('size-baseline.json', 'utf8'));
            }

            let body = '## 📦 Bundle Size Report\n\n';
            body += '| Bundle | Size | Change |\n';
            body += '|--------|------|--------|\n';

            for (const entry of current) {
              const baselineEntry = baseline?.find(b => b.name === entry.name);
              const size = (entry.size / 1024).toFixed(2) + ' kB';
              let change = '—';
              if (baselineEntry) {
                const diff = entry.size - baselineEntry.size;
                const pct = ((diff / baselineEntry.size) * 100).toFixed(1);
                if (diff > 0) change = `+${(diff/1024).toFixed(2)} kB (+${pct}%)`;
                else if (diff < 0) change = `${(diff/1024).toFixed(2)} kB (${pct}%)`;
                else change = '✓ No change';
              }
              body += `| ${entry.name} | ${size} | ${change} |\n`;
            }

            if (!baseline) {
              body += '\n*No baseline available yet. Merge this PR to establish the baseline.*';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Bundle Size Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
